kind: DomainModel
version: v1
title: TermCRM Domain Model
description: >
  A terminal CRM for a small sales team. It tracks the companies a team sells to, the
  contacts at those companies, the deals it is trying to close, the tasks people must get
  done, and an append-only log of interactions. All state lives locally in an embedded
  graph database; a single command-line binary is the only interface.

glossary:
  Admin: "A `User` with role Admin. May perform any action on any record and operates the system."
  Manager: "A `User` with role Manager. Reads and writes the records of their own `Team`."
  Rep: "A sales `User` with role Rep. Owns and works their own records and reads across their `Team`."
  ReadOnly: "A `User` with role ReadOnly. May read records for reporting but perform no mutations."
  Owner: "The `User` who owns a record (a `Company`, `Contact`, or `Deal`) and is entitled to work it."
  Assignee: "The `User` responsible for completing a `Task`."
  Author: "The `User` who logged an `Interaction`."
  Member: "A `User` who belongs to a `Team`."

enums:
  UserRole:
    description: "The authority a `User` holds over records."
    values:
      - name: Admin
        definition: "Full access to every record and every administrative action."
      - name: Manager
        definition: "Read and write access to the records of the manager's own `Team`."
      - name: Rep
        definition: "Owns and works their own records; reads across their `Team`."
      - name: ReadOnly
        definition: "Read-only access for reporting."
  DealStage:
    description: "Where a `Deal` sits in the sales pipeline. The first four are open stages, in order; the last two are terminal outcomes."
    values:
      - name: Prospecting
        definition: "First contact has been made; the opportunity is unqualified."
      - name: Qualification
        definition: "The opportunity has been qualified as real and worth pursuing."
      - name: Proposal
        definition: "A proposal or quote is in front of the customer."
      - name: Negotiation
        definition: "Terms are being negotiated; the last open stage before an outcome."
      - name: Won
        definition: "The deal closed successfully. Terminal. Records when it closed."
      - name: Lost
        definition: "The deal closed unsuccessfully. Terminal."
  TaskStatus:
    description: "The lifecycle state of a `Task`."
    values:
      - name: Open
        definition: "Created but not yet started."
      - name: InProgress
        definition: "Being worked on."
      - name: Done
        definition: "Finished successfully. Terminal."
      - name: Abandoned
        definition: "Given up without completing. Terminal."
  InteractionKind:
    description: "What kind of touch an `Interaction` records."
    values:
      - name: Call
        definition: "A phone call."
      - name: Meeting
        definition: "An in-person or video meeting."
      - name: Email
        definition: "An email exchange."
      - name: Note
        definition: "A free-form note."

entities:
  User:
    definition: >
      A person who operates the system, identified by a unique username and authenticated by a
      password that is never stored in a recoverable form. A user holds one role and may be active
      or deactivated. A user is not a contact: contacts are people at customer companies, users are
      operators of this system.
    relationships:
      - entity: Team
        cardinality: n:1
        role: "`Member`"
        note: "A user belongs to at most one team; a rep belongs to exactly one."
    attributes:
      - name: id
        type: string
        description: "Stable unique identifier."
      - name: username
        type: string
        description: "Unique login name."
      - name: passwordHash
        type: string
        description: "A non-reversible hash of the password. The plaintext password is never stored."
      - name: role
        type: UserRole
        description: "The authority this user holds."
      - name: active
        type: boolean
        description: "False once deactivated; a deactivated user cannot open a session."
    actions:
      - name: create
        actor: Admin
        preserves: [username-unique, password-not-recoverable, rep-one-team]
        description: "Register a new user with a username, a hashed password, a role, and a team."
      - name: changePassword
        actor: User
        preserves: [password-not-recoverable]
        description: "Replace the stored password hash. The plaintext is hashed and discarded."
      - name: deactivate
        actor: Admin
        preserves: [deactivated-cannot-login]
        description: "Set active to false so the user can no longer open a session."
      - name: reactivate
        actor: Admin
        description: "Set active to true again."
      - name: assignTeam
        actor: Admin
        preserves: [rep-one-team]
        description: "Move a user to a team."
    invariants:
      - id: username-unique
        statement: "Every `User` has a username that is unique across all users."
      - id: password-not-recoverable
        statement: "A `User` password is stored only as a non-reversible hash, never in a recoverable form."
      - id: deactivated-cannot-login
        statement: "A `User` whose `active` is false cannot open a session."
      - id: rep-one-team
        statement: "Every `User` with role Rep references exactly one `Team`."
      - id: access-scope
        statement: >
          A `Rep` reads and writes only records they own and reads across their `Team`; a `Manager`
          reads and writes their `Team`'s records; an `Admin` may access everything; a `ReadOnly`
          user may only read.

  Team:
    definition: >
      A named group of users overseen by a manager. Reps are grouped into teams so that read access
      can be scoped to a team. A team is a grouping, not a record that is sold to.
    attributes:
      - name: id
        type: string
        description: "Stable unique identifier."
      - name: name
        type: string
        description: "Human-readable team name."
    actions:
      - name: create
        actor: Admin
        preserves: [team-name-unique]
        description: "Create a team."
      - name: rename
        actor: Admin
        preserves: [team-name-unique]
        description: "Change a team's name."
    invariants:
      - id: team-name-unique
        statement: "Every `Team` has a name that is unique across all teams."

  Company:
    definition: >
      An organization the team sells to. A company is owned by one user and may have many contacts
      and deals. It is a customer account, distinct from a `Team`, which is an internal grouping.
    relationships:
      - entity: User
        cardinality: n:1
        role: "`Owner`"
        note: "The user who owns and works this company."
    attributes:
      - name: id
        type: string
        description: "Stable unique identifier."
      - name: name
        type: string
        description: "Company name."
      - name: domain
        type: string
        description: "Primary web domain, for disambiguation."
    actions:
      - name: create
        actor: Rep
        preserves: [access-scope, company-has-owner]
        description: "Create a company owned by the creating user."
      - name: update
        actor: Owner
        preserves: [access-scope]
        description: "Edit company fields."
      - name: delete
        actor: Manager
        preserves: [access-scope]
        description: "Remove a company."
      - name: reassign
        actor: Manager
        preserves: [reassign-role, company-has-owner]
        description: "Move ownership of the company to another user."
    invariants:
      - id: company-has-owner
        statement: "Every `Company` has exactly one owning `User`."

  Contact:
    definition: >
      A person the team talks to at a `Company`. A contact belongs to one company and is owned by
      one user. A contact is a customer-side person, never an operator of this system (that is a `User`).
    relationships:
      - entity: Company
        cardinality: n:1
        note: "The company this contact works at."
      - entity: User
        cardinality: n:1
        role: "`Owner`"
        note: "The user who owns and works this contact."
    attributes:
      - name: id
        type: string
        description: "Stable unique identifier."
      - name: name
        type: string
        description: "Contact's full name."
      - name: email
        type: string
        description: "Contact email address."
      - name: phone
        type: string
        description: "Contact phone number."
    actions:
      - name: create
        actor: Rep
        preserves: [access-scope, contact-in-company]
        description: "Create a contact under a company, owned by the creating user."
      - name: update
        actor: Owner
        preserves: [access-scope]
        description: "Edit contact fields."
      - name: delete
        actor: Manager
        preserves: [access-scope]
        description: "Remove a contact."
      - name: reassign
        actor: Manager
        preserves: [reassign-role]
        description: "Move ownership of the contact to another user."
    invariants:
      - id: contact-in-company
        statement: "Every `Contact` belongs to exactly one `Company`."

  Deal:
    definition: >
      An opportunity the team is trying to close with a `Company`. A deal moves through an ordered
      sales pipeline and ends Won or Lost. It carries a money amount that is never negative. A deal
      is the sellable opportunity, distinct from the `Company` it is with and the `Task`s that track
      work on it.
    relationships:
      - entity: Company
        cardinality: n:1
        note: "The company this deal is with."
      - entity: User
        cardinality: n:1
        role: "`Owner`"
        note: "The user who owns and works this deal."
    attributes:
      - name: id
        type: string
        description: "Stable unique identifier."
      - name: name
        type: string
        description: "Short description of the opportunity."
      - name: amount
        type: integer
        description: "Deal value in the smallest currency unit (cents). Never negative."
      - name: stage
        type: DealStage
        description: "Current pipeline stage. This is the lifecycle."
      - name: closedAt
        type: timestamp
        description: "When the deal closed. Set when the deal reaches Won (and Lost); unset while open."
    actions:
      - name: create
        actor: Rep
        preserves: [deal-amount-non-negative, access-scope]
        description: "Create a deal in stage Prospecting with a non-negative amount, owned by the creator."
      - name: advance
        actor: Owner
        preserves: [deal-forward-only]
        description: "Move the deal to the next open stage. Not defined from Negotiation."
      - name: win
        actor: Owner
        preserves: [deal-forward-only, deal-won-has-close-date]
        description: "Close the deal as Won from any open stage; records closedAt."
      - name: lose
        actor: Owner
        preserves: [deal-forward-only]
        description: "Close the deal as Lost from any open stage; records closedAt."
      - name: reopen
        actor: Manager
        preserves: [deal-forward-only, deal-reopen-role, deal-reopen-to-negotiation]
        description: "Reopen a closed deal back to Negotiation. Manager or Admin only."
      - name: updateAmount
        actor: Owner
        preserves: [deal-amount-non-negative]
        description: "Change the deal amount, which must stay non-negative."
      - name: reassign
        actor: Manager
        preserves: [reassign-role]
        description: "Move ownership of the deal to another user."
    invariants:
      - id: deal-amount-non-negative
        statement: "A `Deal` amount is never negative."
      - id: deal-forward-only
        statement: >
          A `Deal` stage only advances to the next open stage, closes to Won or Lost, or is reopened
          to Negotiation; it never otherwise moves backward.
      - id: deal-won-has-close-date
        statement: "A `Deal` in stage Won has a recorded `closedAt` timestamp."
      - id: deal-reopen-role
        statement: "Only a `Manager` or `Admin` may reopen a closed `Deal`."
      - id: deal-reopen-to-negotiation
        statement: "Reopening a closed `Deal` returns it to stage Negotiation."

  Task:
    definition: >
      A unit of work someone must get done, with a due date and an assignee. A task is created, worked
      on, then finished or abandoned. A task tracks work; it is not itself a `Deal` or a `Contact`.
    relationships:
      - entity: User
        cardinality: n:1
        role: "`Assignee`"
        note: "The user responsible for this task."
      - entity: Deal
        cardinality: n:1
        note: "Optional deal this task relates to."
    attributes:
      - name: id
        type: string
        description: "Stable unique identifier."
      - name: title
        type: string
        description: "What must be done."
      - name: dueDate
        type: timestamp
        description: "When the task is due."
      - name: status
        type: TaskStatus
        description: "Current lifecycle state."
    actions:
      - name: create
        actor: Rep
        preserves: [task-has-assignee, task-has-due-date]
        description: "Create a task in status Open with a due date and an assignee."
      - name: start
        actor: Assignee
        description: "Begin working the task; moves Open to InProgress."
      - name: complete
        actor: Assignee
        preserves: [task-terminal-closed]
        description: "Finish the task; moves InProgress to Done."
      - name: abandon
        actor: Assignee
        preserves: [task-terminal-closed]
        description: "Give up the task; moves an open or in-progress task to Abandoned."
      - name: reassign
        actor: Manager
        preserves: [access-scope]
        description: "Move the task to a different assignee."
    invariants:
      - id: task-has-assignee
        statement: "Every `Task` references exactly one `Assignee`."
      - id: task-has-due-date
        statement: "Every `Task` has a due date."
      - id: task-terminal-closed
        statement: "A `Task` in Done or Abandoned accepts no further lifecycle actions."

  Interaction:
    definition: >
      An append-only record of a touch with a `Contact`: a call, meeting, email, or note. An
      interaction is immutable once logged; a mistake is corrected by deleting and re-logging, never
      by editing. It is a historical log entry, not a mutable record like a `Deal`.
    relationships:
      - entity: Contact
        cardinality: n:1
        note: "The contact this interaction was with."
      - entity: User
        cardinality: n:1
        role: "`Author`"
        note: "The user who logged this interaction."
    attributes:
      - name: id
        type: string
        description: "Stable unique identifier."
      - name: kind
        type: InteractionKind
        description: "Call, meeting, email, or note."
      - name: occurredAt
        type: timestamp
        description: "When the interaction happened."
      - name: body
        type: string
        description: "Free-form details of the interaction."
    actions:
      - name: log
        actor: Author
        preserves: [interaction-append-only]
        description: "Append a new interaction. There is no edit action."
      - name: delete
        actor: Author
        preserves: [interaction-append-only]
        description: "Remove an interaction so a corrected one can be re-logged."
    invariants:
      - id: interaction-append-only
        statement: >
          An `Interaction` is immutable; it is corrected only by deleting and re-logging, never
          edited in place.

invariants:
  - id: reassign-role
    statement: "Only a `Manager` or `Admin` may change the owner of a `Company`, `Contact`, or `Deal`."

scenarios:
  - name: Advance and win a deal
    description: "The happy path through the pipeline to a successful close."
    actors: [Rep]
    steps:
      - "A `Rep` creates a `Deal` in stage Prospecting with a non-negative amount."
      - "The `Rep` advances the `Deal` to Qualification, then Proposal, then Negotiation."
      - "The `Rep` wins the `Deal`; its stage becomes Won and `closedAt` is recorded."
    invariants_touched: [deal-forward-only, deal-won-has-close-date, deal-amount-non-negative]

  - name: Reject a negative amount
    description: "A deal amount may never go negative."
    actors: [Rep]
    steps:
      - "A `Rep` tries to create a `Deal` with a negative amount; the create is rejected."
      - "The `Rep` creates the `Deal` with a valid amount, then tries updateAmount to a negative value; it is rejected."
    invariants_touched: [deal-amount-non-negative]

  - name: Only a manager reopens a closed deal
    description: "Reopening is role-gated and always returns to Negotiation."
    actors: [Rep, Manager]
    steps:
      - "A `Deal` is Lost."
      - "A `Rep` attempts to reopen it; the action is rejected because the rep is neither manager nor admin."
      - "A `Manager` reopens it; the `Deal` returns to stage Negotiation."
    invariants_touched: [deal-reopen-role, deal-reopen-to-negotiation, deal-forward-only]

  - name: Concurrent writers on one deal
    description: "Two terminals write the same deal at once; data is never corrupted."
    actors: [Rep]
    steps:
      - "Two commands both load the same `Deal` and both try to advance it."
      - "The first write commits; the second detects the changed version and retries with backoff."
      - "After the bounded retries are exhausted, the second command is politely refused and the `Deal` is unchanged by it."
    invariants_touched: [deal-forward-only]

  - name: Deactivated user cannot log in
    description: "Deactivation blocks session creation."
    actors: [Admin]
    steps:
      - "An `Admin` deactivates a `User`."
      - "That user runs a command; authentication refuses it because `active` is false."
    invariants_touched: [deactivated-cannot-login]

  - name: Team read but not write
    description: "A rep may read a teammate's record but not edit it until ownership moves."
    actors: [Rep, Manager]
    steps:
      - "A `Rep` reads a `Deal` owned by a teammate on the same `Team`."
      - "The `Rep` tries to edit it and is refused because they are not the owner."
      - "A `Manager` reassigns the `Deal` to the `Rep`, who may now edit it."
    invariants_touched: [access-scope, reassign-role]

  - name: Task lifecycle and closure
    description: "A task runs to Done and then rejects further actions."
    actors: [Rep, Assignee]
    steps:
      - "A `Rep` creates a `Task` with a due date and an `Assignee`."
      - "The `Assignee` starts the task, then completes it; status becomes Done."
      - "A later attempt to start the Done task is rejected."
    invariants_touched: [task-has-assignee, task-has-due-date, task-terminal-closed]

  - name: Correct an interaction by re-logging
    description: "Interactions are append-only."
    actors: [Author]
    steps:
      - "An `Author` logs an `Interaction` with a mistaken body."
      - "The `Author` deletes it and logs a corrected `Interaction`; the original is never edited in place."
    invariants_touched: [interaction-append-only]

  - name: Unique username enforced
    description: "Two users cannot share a username."
    actors: [Admin]
    steps:
      - "An `Admin` creates a `User` with a username."
      - "The `Admin` tries to create a second `User` with the same username; it is rejected."
    invariants_touched: [username-unique]

  - name: Corrupted database fails loudly
    description: "A corrupted store stops the command with restore instructions rather than proceeding."
    actors: [Rep]
    steps:
      - "A command opens the embedded database and the integrity check fails."
      - "The command aborts loudly, telling the user to restore from a backup, and makes no writes."
    invariants_touched: []

  - name: Create a company and contact, then reassign
    description: "Account setup and ownership transfer across company and contact."
    actors: [Rep, Manager]
    steps:
      - "A `Rep` creates a `Company`, which is owned by the creating rep."
      - "The `Rep` creates a `Contact` under that `Company`, owned by the rep."
      - "A `Manager` reassigns the `Company` to another `User`."
    invariants_touched: [company-has-owner, contact-in-company, reassign-role]

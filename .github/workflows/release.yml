# release.yml - cross-compile and publish the machinery binary on tag push.
# Produces static binaries for the three major OSes + archs, checksums them,
# and attaches everything to a GitHub Release. Users install without Go.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write      # needed to create the release
  id-token: write      # SLSA build provenance (attest-build-provenance)
  attestations: write  # SLSA build provenance (attest-build-provenance)

jobs:
  # ---------------------------------------------------------------- build ---
  # Cross-compile in a single matrix job. CGO is disabled so the binaries are
  # fully static (no libc dependency on Linux, works on any glibc/musl).
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          binary="machinery-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o "dist/$binary" ./cmd/machinery
          echo "Built dist/$binary"
      - name: Package tarball (pvg-compatible)
        if: matrix.goos != 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        # Convergence managers that follow the goreleaser convention (pvg's
        # channel installer) expect <tool>_<ver>_<os>_<arch>.tar.gz containing
        # the bare `machinery` binary, verified against checksums.txt. The
        # bare per-platform binaries above remain for install.sh.
        run: |
          version="${{ steps.ver.outputs.version }}"
          plain="${version#v}"
          cp "dist/machinery-${GOOS}-${GOARCH}" machinery
          tar czf "dist/machinery_${plain}_${GOOS}_${GOARCH}.tar.gz" machinery
          rm machinery
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: machinery-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ------------------------------------------------------------ publish ---
  # Collect all artifacts, generate checksums, and create the GitHub Release.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum machinery-* | tee checksums-sha256.txt
      - name: Generate goreleaser-style checksums (pvg-compatible)
        working-directory: dist
        run: sha256sum machinery_*.tar.gz | tee checksums.txt
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/machinery-*
            dist/machinery_*.tar.gz
      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: machinery ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/machinery-*
            dist/machinery_*.tar.gz
            dist/checksums-sha256.txt
            dist/checksums.txt

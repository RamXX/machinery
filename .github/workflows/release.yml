# release.yml — cross-compile and publish the machinery binary on tag push.
# Produces static binaries for the three major OSes + archs, checksums them,
# and attaches everything to a GitHub Release. Users install without Go.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write   # needed to create the release

jobs:
  # ---------------------------------------------------------------- build ---
  # Cross-compile in a single matrix job. CGO is disabled so the binaries are
  # fully static (no libc dependency on Linux, works on any glibc/musl).
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          binary="machinery-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o "dist/$binary" ./cmd/machinery
          echo "Built dist/$binary"
      - uses: actions/upload-artifact@v4
        with:
          name: machinery-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ------------------------------------------------------------ publish ---
  # Collect all artifacts, generate checksums, and create the GitHub Release.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum machinery-* | tee checksums-sha256.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: machinery ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/machinery-*
            dist/checksums-sha256.txt

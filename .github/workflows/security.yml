# security.yml - security scanning: dependency vulnerabilities and leaked secrets.
# Runs on every push/PR and nightly (to catch new CVEs disclosed after a PR).
name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # govulncheck scans the Go module against the Go vulnerability database. It
  # reports only vulnerabilities in code paths the binary actually uses (not
  # every transitive CVE), so it is high-signal.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck (machinery toolchain)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...
      # Also scan the example application's dependencies (separate go.mod).
      - name: Run govulncheck (go-crm example impl)
        working-directory: examples/go-crm/impl
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...

  # gitleaks scans the full history and the working tree for secrets (API keys,
  # tokens, private keys) on every trigger (full clone, fetch-depth 0).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history for secret scanning
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If you have a paid Gitleaks license, set GITLEAKS_LICENSE; otherwise
          # the OSS scan runs on push/PR (the free tier is sufficient here).

  # Dependency Review (GitHub native): blocks PRs that introduce a dependency
  # with a known vulnerability or an incompatible license. Only on PRs.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail on any high/critical vulnerability introduced; warn on moderate.
          fail-on-severity: high

# nightly.yml - the deep, non-blocking checks that run once a day (or on
# manual dispatch). They do not block PRs; they surface drift on a cadence so
# it cannot accumulate silently.
name: nightly

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Regenerate every committed generated artifact (oracles AND formal specs)
  # and assert an empty git diff. Silent when fresh; a diff means a committed
  # artifact is stale or a generator drifted.
  regen-clean-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Regenerate oracles with Go
        run: |
          make build
          for md in examples/go-crm/design/machines examples/surreal-crm/design/machines \
                    examples/fulfillment/design/machines \
                    examples/portfolio-engine/design/machines \
                    examples/checkout-split/orders/design/machines \
                    examples/checkout-split/payments/design/machines; do
            .bin/machinery oracle "$md"
          done
          .bin/machinery pack generate examples/checkout-split/parent/design
      # verify-formal --gen-only runs the exact generator orchestration the
      # checked run uses (tla + refine + compose, coordinator parsed as YAML),
      # with TLC skipped so this job stays Java-free. The previous shell
      # reimplementation of this loop misparsed a commented coordinator line;
      # single-sourcing it in the binary is the fix.
      - name: Regenerate formal specs with Go
        run: |
          for d in examples/go-crm/design examples/surreal-crm/design \
                   examples/fulfillment/design \
                   examples/portfolio-engine/design \
                   examples/checkout-split/orders/design \
                   examples/checkout-split/payments/design; do
            .bin/machinery verify-formal --gen-only "$d" || exit 1
          done
      - name: Regenerate pack refinement proofs with Go
        run: |
          .bin/machinery pack refine examples/checkout-split/orders/design
          .bin/machinery pack refine examples/checkout-split/payments/design
      - name: Assert clean tree
        run: |
          status=$(git status --porcelain)
          if [ -n "$status" ]; then
            echo "$status"
            echo "::error::regeneration dirtied the tree (a stale tracked artifact or a newly emitted file)"
            exit 1
          fi

  # The golden corpus + full unit suite, on a cadence: the canary for
  # environment-driven divergence (Go toolchain updates changing output).
  golden-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Go unit suite
        run: go test -count=1 ./...
      - name: Golden corpus
        run: go test -count=1 -run TestGolden ./cmd/machinery

  # Nightly govulncheck - catches newly-disclosed CVEs in dependencies between
  # PRs. Mirrors the security.yml job but on the schedule so we learn of a vuln
  # the day it's disclosed, not the next time someone opens a PR.
  vulncheck-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...
      - working-directory: examples/go-crm/impl
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...

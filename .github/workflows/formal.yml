# formal.yml - TLC model-checking of every generated TLA+ spec.
# Separated from ci.yml because the JVM setup is heavy and TLC is the slowest
# job (~minutes per design). Runs on push/PR but is allowed to report
# independently so a TLC regression is visible without masking faster checks.
name: formal

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: formal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      # Cache the pinned tla2tools.jar so we don't re-download/verify every run.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/machinery
          key: tla2tools-v1.7.4
      - name: Build machinery
        run: make build
      - name: Regenerate + TLC-check go-crm
        run: .bin/machinery verify-formal examples/go-crm/design
      - name: Regenerate + TLC-check surreal-crm (store-swap rebuild)
        run: .bin/machinery verify-formal examples/surreal-crm/design
      - name: Regenerate + TLC-check fulfillment
        run: .bin/machinery verify-formal examples/fulfillment/design
      - name: Regenerate + TLC-check portfolio-engine
        run: .bin/machinery verify-formal examples/portfolio-engine/design
      - name: Regenerate + TLC-check checkout-split children (contract refinement proofs)
        run: |
          .bin/machinery verify-formal examples/checkout-split/orders/design
          .bin/machinery verify-formal examples/checkout-split/payments/design

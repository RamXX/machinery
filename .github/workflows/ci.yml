name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: astral-sh/setup-uv@v5
      - name: Build machinery binary
        run: make build
      - name: Toolchain Go test suite
        run: go test ./...
      - name: Gate suite, go-crm (design + impl) via Go binary
        run: .bin/machinery check examples/go-crm/design --impl examples/go-crm/impl
      - name: Gate suite, fulfillment (design only) via Go binary
        run: .bin/machinery check examples/fulfillment/design

  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/machinery
          key: tla2tools-v1.7.4
      - name: Install generator dependency
        run: pip install pyyaml
      - name: Regenerate + TLC-check all proofs via Go binary
        run: make verify-formal

  go-crm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/go-crm/impl/go.mod
      - name: go-crm hermetic suite
        working-directory: examples/go-crm/impl
        run: go test ./... -count=1

  # Phase 11: the differential scoreboard, now REQUIRED. On every push, Go must
  # equal Python byte-for-byte on stdout/stderr/exit/emitted-files across the
  # whole corpus, and the Go unit + experiment suite must be green. A single
  # divergence fails the build.
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pyyaml
      - name: Go unit + experiment tests
        run: go test ./...
      - name: Python pytest suite (the oracle during shadow)
        run: uv run -q -- pytest -q
      - name: Differential harness (Go == Python byte-for-byte)
        run: bash scripts/diff-all.sh

  # Phase 11 nightly: regenerate all committed oracles/.tla with Go and assert
  # an empty git diff. Silent when parity holds.
  nightly-regen:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Regenerate with Go, assert clean tree
        run: |
          go build -o .bin/machinery ./cmd/machinery
          for ex in go-crm fulfillment portfolio-engine; do
            .bin/machinery oracle examples/$ex/design/machines
          done
          git diff --exit-code

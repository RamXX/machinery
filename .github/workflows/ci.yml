# ci.yml - the required pipeline. Every push and PR must pass this.
# Coverage: build, lint (golangci-lint + gofmt + vet), unit tests (including
# the adversarial gate-experiment suite and the golden-corpus regression net),
# the example gate suites (all four examples), and the go-crm impl tests. A single failure
# blocks merge.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- build ---
  # Compile the binary on three OSes + cross-compile for the release targets.
  # Verifies CGO_DISABLED static builds work (the release pipeline depends on it).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build (static, CGO disabled)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w -X main.version=ci" -o machinery ./cmd/machinery
      - name: Smoke-test --version
        # Cross-compiled targets cannot execute on the build runner; smoke-test
        # only the native os/arch pairs (linux/arm64 is built on an amd64 runner).
        if: ${{ !(matrix.goos == 'linux' && matrix.goarch == 'arm64') }}
        run: ./machinery version

  # ----------------------------------------------------------------- lint ---
  # golangci-lint (the configured linter set) + gofmt (formatting gate) +
  # go vet (the stdlib analyzer). Formatting is enforced so PRs don't drift.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt (formatting gate)
        run: |
          unformatted=$(gofmt -l cmd/ internal/)
          if [ -n "$unformatted" ]; then
            echo "::error::Files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Read pinned golangci-lint version
        id: gciv
        run: echo "version=$(cat .golangci-version)" >> "$GITHUB_OUTPUT"
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # Uses the v2 config in .golangci.yml. The linter version is the single
          # source of truth in .golangci-version, shared with the local preflight
          # gate (make lint-install) so CI and local run the identical linter.
          # Bump that file deliberately, with the diff reviewed.
          # The action must be v7+ to accept a golangci-lint v2 version string.
          version: ${{ steps.gciv.outputs.version }}
          args: --config .golangci.yml --timeout 5m

  # ----------------------------------------------------------------- test ---
  # The Go unit + experiment suite (every package). This is the fast feedback
  # loop; the examples-exercising jobs run separately below.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Go unit + experiment tests (with race detector)
        run: go test -race -count=1 ./...

  # ---------------------------------------------------------------- gates ---
  # Run the deterministic gate suite on every shipped example via the Go
  # binary. This is the dogfood: machinery checks its own reference designs.
  gates:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build machinery
        run: make build
      - name: Gate suite - go-crm (design + impl)
        run: .bin/machinery check examples/go-crm/design --impl examples/go-crm/impl
      - name: Gate suite - fulfillment (design only)
        run: .bin/machinery check examples/fulfillment/design
      - name: Gate suite - portfolio-engine (design only)
        run: .bin/machinery check examples/portfolio-engine/design
      - name: Gate suite - checkout-split (recursive decomposition, parent + children)
        run: |
          .bin/machinery check examples/checkout-split/parent/design
          .bin/machinery check examples/checkout-split/orders/design
          .bin/machinery check examples/checkout-split/payments/design

  # ----------------------------------------------------- go-crm impl tests ---
  # The example Go application has its own hermetic test suite (separate go.mod).
  go-crm-impl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: examples/go-crm/impl/go.mod
          cache: false
      - name: go-crm hermetic suite
        working-directory: examples/go-crm/impl
        run: go test ./... -count=1

  # -------------------------------------------------------------- golden ---
  # The golden-corpus scoreboard, REQUIRED. The corpus under testdata/golden
  # was captured at Python parity and is now the binary's own byte-for-byte
  # regression net (stdout/stderr/exit and every generated artifact) for the
  # deterministic subcommands across the examples. An intended output change
  # re-captures with `go test ./cmd/machinery -run TestGolden -update` and
  # reviews the diff.
  golden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Golden corpus (byte-for-byte, deterministic subcommands)
        run: go test -count=1 -run TestGolden ./cmd/machinery
      - name: Adversarial gate-experiment suite
        run: go test -count=1 ./internal/experiments/

  # ------------------------------------------------------------ docs gate ---
  # The toolchain command surface is documented in six places (README, SKILL,
  # agent prompts, template, tools README, and the team guide in docs/). This
  # gate fails on any reference to the deleted Python toolchain so the surfaces
  # cannot drift apart again (the exact class of rot the Go port shipped with).
  # Historical mentions are allowed only in internal/README-contract.md and Go
  # package docs.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: No stale Python-toolchain references in the doc surface
        run: |
          if grep -rnE "python3|PyYAML|pyyaml|uv run|oracle_gen\.py|machine_lint\.py|machinery_check\.py|tla_gen\.py|refine_gen\.py|compose_gen\.py|diff-all\.sh|capture-golden\.sh" \
              README.md skills/ agents/ docs/ Makefile; then
            echo "::error::stale Python-toolchain reference found (the toolchain is the Go binary)"
            exit 1
          fi
          echo "doc surface clean"
      # The pattern is spelled with an ANSI-C \u escape so this file itself
      # stays free of the literal character and the grep can scan .github/
      # without self-matching.
      - name: No em dashes in the doc surface (house style)
        run: |
          if grep -rn $'\u2014' README.md skills/ agents/ docs/ Makefile .github/; then
            echo "::error::em dash found; house style forbids it"
            exit 1
          fi
          echo "no em dashes"

  # ----------------------------------------------------------- tidy gate ---
  # go.mod / go.sum must be tidy and in sync. A stray dependency or a missing
  # go.sum entry fails here, not in a downstream consumer.
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod tidy (verify clean)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

# ci.yml — the required pipeline. Every push and PR must pass this.
# Coverage: build, lint (golangci-lint + gofmt + vet), unit tests, the three
# example gate suites, the go-crm impl tests, and the Python==Go differential
# parity harness. A single failure blocks merge.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- build ---
  # Compile the binary on three OSes + cross-compile for the release targets.
  # Verifies CGO_DISABLED static builds work (the release pipeline depends on it).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build (static, CGO disabled)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w -X main.version=ci" -o machinery ./cmd/machinery
      - name: Smoke-test --version
        run: ./machinery version

  # ----------------------------------------------------------------- lint ---
  # golangci-lint (the configured linter set) + gofmt (formatting gate) +
  # go vet (the stdlib analyzer). Formatting is enforced so PRs don't drift.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt (formatting gate)
        run: |
          unformatted=$(gofmt -l cmd/ internal/)
          if [ -n "$unformatted" ]; then
            echo "::error::Files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          # Uses the v2 config in .golangci.yml. Pin a specific version (e.g.
          # v2.x.y) once the remote exists, for reproducibility.
          version: latest
          args: --config .golangci.yml --timeout 5m

  # ----------------------------------------------------------------- test ---
  # The Go unit + experiment suite (every package). This is the fast feedback
  # loop; the examples-exercising jobs run separately below.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Go unit + experiment tests (with race detector)
        run: go test -race -count=1 ./...

  # ---------------------------------------------------------------- gates ---
  # Run the deterministic gate suite on all three shipped examples via the Go
  # binary. This is the dogfood: machinery checks its own reference designs.
  gates:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build machinery
        run: make build
      - name: Gate suite — go-crm (design + impl)
        run: .bin/machinery check examples/go-crm/design --impl examples/go-crm/impl
      - name: Gate suite — fulfillment (design only)
        run: .bin/machinery check examples/fulfillment/design
      - name: Gate suite — portfolio-engine (design only)
        run: .bin/machinery check examples/portfolio-engine/design

  # ----------------------------------------------------- go-crm impl tests ---
  # The example Go application has its own hermetic test suite (separate go.mod).
  go-crm-impl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/go-crm/impl/go.mod
          cache: false
      - name: go-crm hermetic suite
        working-directory: examples/go-crm/impl
        run: go test ./... -count=1

  # -------------------------------------------------------- differential ---
  # The shadow scoreboard, now REQUIRED. Go must equal Python byte-for-byte on
  # stdout/stderr/exit across the whole corpus, and the Python pytest oracle
  # must still be green. A single divergence fails the build. (Python is the
  # frozen differential oracle during the migration window; removed at the
  # python-removed tag once the shadow is silent for K>=20 runs.)
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - run: pip install pyyaml
      - name: Go unit suite
        run: go test -count=1 ./...
      - name: Python pytest oracle (the differential reference)
        run: uv run -q -- pytest -q
      - name: Differential harness (Go == Python byte-for-byte)
        run: bash scripts/diff-all.sh

  # ----------------------------------------------------------- tidy gate ---
  # go.mod / go.sum must be tidy and in sync. A stray dependency or a missing
  # go.sum entry fails here, not in a downstream consumer.
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod tidy (verify clean)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
